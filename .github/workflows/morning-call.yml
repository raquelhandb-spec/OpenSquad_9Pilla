name: Morning Call 9Pilla

on:
  schedule:
    # 09h09 BRT (America/Sao_Paulo = UTC-3 fixo desde 2019)
    # 09:09 BRT = 12:09 UTC
    - cron: '9 12 * * 1-5'
  workflow_dispatch:
    # Permite disparo manual pelo GitHub (útil para teste)
    inputs:
      dry_run:
        description: 'Dry-run: só valida a busca real (brapi + notícias) e NÃO envia ao grupo'
        type: boolean
        default: false

jobs:
  send-morning-call:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Criar config (dry-run) a partir dos secrets
        if: ${{ inputs.dry_run }}
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: |
          mkdir -p .claude
          cat > .claude/config-morning-call.json << EOF
          { "brapi": { "baseUrl": "https://brapi.dev/api", "token": "${BRAPI_TOKEN}" } }
          EOF
          echo "✅ Config dry-run criado."

      - name: Validar busca real (dry-run, NÃO envia)
        if: ${{ inputs.dry_run }}
        run: node .claude/scripts/validate-fetch.js

      - name: Encerrar (dry-run não envia)
        if: ${{ inputs.dry_run }}
        run: echo "🔎 Dry-run concluído. Nada foi enviado ao grupo."

      - name: Verificar arquivo de conteúdo do dia
        if: ${{ !inputs.dry_run }}
        id: check_content
        run: |
          DATE=$(TZ="America/Sao_Paulo" date +%Y-%m-%d)
          FILE="content/morning-call/${DATE}.md"
          echo "Data BRT: $DATE"
          if [ ! -f "$FILE" ]; then
            echo "⚠️ Arquivo $FILE não encontrado."
            echo "content_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "content_available=true" >> "$GITHUB_OUTPUT"
          echo "✅ Arquivo $FILE encontrado."

      - name: Criar config-morning-call.json a partir dos secrets
        if: steps.check_content.outputs.content_available == 'true'
        env:
          ZAPI_INSTANCE_ID: ${{ secrets.ZAPI_INSTANCE_ID }}
          ZAPI_TOKEN: ${{ secrets.ZAPI_TOKEN }}
          ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
          ZAPI_GROUP_JID: ${{ secrets.ZAPI_GROUP_JID }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
        run: |
          cat > .claude/config-morning-call.json << EOF
          {
            "z-api": {
              "apiUrl": "https://api.z-api.io/instances/${ZAPI_INSTANCE_ID}/token/${ZAPI_TOKEN}/send-text",
              "groupJid": "${ZAPI_GROUP_JID}",
              "clientToken": "${ZAPI_CLIENT_TOKEN}"
            },
            "brapi": {
              "baseUrl": "https://brapi.dev/api",
              "token": "${BRAPI_TOKEN}"
            }
          }
          EOF
          echo "✅ Config criado."

      - name: Pular envio quando conteúdo estiver ausente
        if: ${{ !inputs.dry_run && steps.check_content.outputs.content_available != 'true' }}
        run: |
          echo "Envio pulado: conteúdo diário não foi gerado."

      - name: Enviar Morning Call via Z-API
        if: steps.check_content.outputs.content_available == 'true'
        run: node .claude/scripts/send-morning-call.js
