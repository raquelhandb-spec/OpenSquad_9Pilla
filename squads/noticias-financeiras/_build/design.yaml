# Design output — generated by Design phase
# Input: discovery.yaml + investigation (5 perfis Instagram)

squad:
  code: "noticias-financeiras"
  name: "Notícias Financeiras 9Pilla"
  description: "Cria carrosséis diários para o Instagram da 9Pilla sobre notícias do mercado financeiro brasileiro"

agents:
  - id: "squads/noticias-financeiras/agents/nara-noticias"
    name: "Nara Notícias"
    title: "Pesquisadora de Notícias Financeiras"
    icon: "🔍"
    execution: "subagent"
    role_summary: "Pesquisa e ranqueia as 3-5 principais notícias do mercado financeiro brasileiro do dia"
    skills: ["web_search", "web_fetch", "apify"]
    tasks:
      - name: "find-and-rank-news"
        file: "tasks/find-and-rank-news.md"
        description: "Pesquisa e ranqueia notícias financeiras brasileiras do período selecionado"

  - id: "squads/noticias-financeiras/agents/carlos-carrossel"
    name: "Carlos Carrossel"
    title: "Redator de Carrosséis Financeiros"
    icon: "✍️"
    execution: "inline"
    role_summary: "Gera ângulos editoriais da notícia selecionada e escreve o copy completo do carrossel"
    skills: []
    tasks:
      - name: "generate-angles"
        file: "tasks/generate-angles.md"
        description: "Gera 5 ângulos distintos para a notícia selecionada"
      - name: "create-carousel"
        file: "tasks/create-carousel.md"
        description: "Escreve o copy completo do carrossel: hook, slides, legenda e CTA"

  - id: "squads/noticias-financeiras/agents/diana-design"
    name: "Diana Design"
    title: "Designer de Slides para Instagram"
    icon: "🎨"
    execution: "subagent"
    role_summary: "Cria os slides do carrossel no Canva a partir do copy aprovado"
    skills: ["canva"]
    tasks:
      - name: "create-slides"
        file: "tasks/create-slides.md"
        description: "Cria os slides do carrossel no Canva com identidade visual da 9Pilla"

  - id: "squads/noticias-financeiras/agents/rafael-revisao"
    name: "Rafael Revisão"
    title: "Revisor de Conteúdo Financeiro"
    icon: "✅"
    execution: "inline"
    role_summary: "Revisa copy e design do carrossel com critérios de qualidade baseados nos top performers do segmento"
    skills: []
    tasks:
      - name: "review"
        file: "tasks/review.md"
        description: "Revisa copy + design e emite veredito APROVADO ou REPROVADO com feedback"

  - id: "squads/noticias-financeiras/agents/gabi-gatilho"
    name: "Gabi Gatilho"
    title: "Coordenadora de Publicação"
    icon: "🎯"
    execution: "inline"
    role_summary: "Apresenta o carrossel finalizado e revisado, solicita confirmação explícita 'sim' do usuário antes de acionar a publicação"
    skills: []

  - id: "squads/noticias-financeiras/agents/paula-publicadora"
    name: "Paula Publicadora"
    title: "Publicadora Instagram"
    icon: "📲"
    execution: "subagent"
    role_summary: "Publica o carrossel aprovado no Instagram da 9Pilla via instagram-publisher"
    skills: ["instagram-publisher"]
    tasks:
      - name: "publish-carousel"
        file: "tasks/publish-carousel.md"
        description: "Publica o carrossel no Instagram com caption e imagens aprovadas"

pipeline:
  - step: 1
    name: "checkpoint-research-focus"
    type: "checkpoint"
    output_file: "squads/noticias-financeiras/output/research-focus.md"

  - step: 2
    name: "news-research"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/nara-noticias"
    execution: "subagent"
    input_file: "squads/noticias-financeiras/output/research-focus.md"
    output_file: "squads/noticias-financeiras/output/news-list.md"
    model_tier: "powerful"

  - step: 3
    name: "checkpoint-news-selection"
    type: "checkpoint"

  - step: 4
    name: "generate-angles"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/carlos-carrossel"
    execution: "inline"
    input_file: "squads/noticias-financeiras/output/news-list.md"
    output_file: "squads/noticias-financeiras/output/angles.md"

  - step: 5
    name: "checkpoint-angle-selection"
    type: "checkpoint"

  - step: 6
    name: "create-carousel"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/carlos-carrossel"
    execution: "inline"
    format: "instagram-feed"
    input_file: "squads/noticias-financeiras/output/angles.md"
    output_file: "squads/noticias-financeiras/output/carousel-draft.md"

  - step: 7
    name: "checkpoint-content-approval"
    type: "checkpoint"

  - step: 8
    name: "create-slides"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/diana-design"
    execution: "subagent"
    input_file: "squads/noticias-financeiras/output/carousel-draft.md"
    output_file: "squads/noticias-financeiras/output/slides-report.md"
    model_tier: "powerful"

  - step: 9
    name: "review"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/rafael-revisao"
    execution: "inline"
    input_file: "squads/noticias-financeiras/output/slides-report.md"
    output_file: "squads/noticias-financeiras/output/review-report.md"
    on_reject: 6

  - step: 10
    name: "final-approval"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/gabi-gatilho"
    execution: "inline"
    input_file: "squads/noticias-financeiras/output/review-report.md"

  - step: 11
    name: "publish"
    type: "agent"
    agent: "squads/noticias-financeiras/agents/paula-publicadora"
    execution: "subagent"
    input_file: "squads/noticias-financeiras/output/carousel-draft.md"
    output_file: "squads/noticias-financeiras/output/publish-report.md"
    model_tier: "fast"

investigation:
  enriched: true
  profiles_analyzed: 5
  date: "2026-04-07"
  dir: "squads/noticias-financeiras/_investigations"

skills_installed:
  - "web_search"
  - "web_fetch"
  - "apify"
  - "canva"
  - "instagram-publisher"

formats_selected:
  - "instagram-feed"

best_practices_consulted:
  - "copywriting.md"
  - "researching.md"
  - "review.md"
  - "image-design.md"
  - "instagram-feed.md"
  - "social-networks-publishing.md"
