    output_dir: "../../content/reels"

  - id: criar-copy-produto
    name: "Criar Copy de Produto"
    command: "/criar-copy-produto"
    flow: ["nina-redacao", "lea-cvm"]
    description: "Gera copy de venda para produto 9Pilla"
    output_dir: "../../content/copies"

  - id: mensagem-grupo
    name: "Mensagem para Turma/VIP"
    command: "/mensagem-grupo"
    flow: ["nina-redacao"]
    description: "Cria mensagem para Turma 9Pilla ou Grupo Winner VIP"
    output_dir: "../../content/grupos"

  - id: sinal-privado
    name: "Gerar Sinal Privado"
    command: "/sinal-privado"
    flow: ["amorim-editor", "lea-cvm"]
    description: "Gera sinal ITM exclusivo para Raquel (NUNCA público)"
    output_dir: "../../content/sinais"
