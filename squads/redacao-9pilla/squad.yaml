    file: "../../skills/nina-redacao/SKILL.md"

  - id: lea-compliance
    name: "Léa Compliance CVM"
    file: "../../skills/lea-compliance/SKILL.md"

  - id: bela-research
    name: "Bela Píllula Sabedoria"
    file: "../../skills/bela-pilula/SKILL.md"

integrations:
  - name: "Canva"
    for: ["reel-script", "copy-product"]
    skill: "canva"

  - name: "HeyGen"
    for: ["reel-script"]
    skill: "heygen"

  - name: "Instagram Publisher"
    for: ["morning-call", "reel-script"]
    skill: "instagram-publisher"

  - name: "Z-API (WhatsApp)"
    for: ["morning-call", "mensagem-grupo"]
