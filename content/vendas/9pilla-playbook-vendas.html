  .obj-item .a b{color:var(--green-soft)}

  table.tear td,table.tear th{border:1px solid var(--line);padding:9px 11px;text-align:left;vertical-align:top}
  table.tear th{color:var(--green-soft);background:var(--card);font-size:12px;text-transform:uppercase;letter-spacing:.05em}
  table.tear td:first-child{color:var(--gold-soft);font-weight:600;white-space:nowrap}
  .redline{background:rgba(255,139,107,.08);border:1px solid rgba(255,139,107,.35);border-radius:12px;padding:14px 16px;margin:12px 0;color:#ffd3c6;font-size:14px}

    .side{position:fixed;left:0;top:0;width:290px;z-index:50;transform:translateX(-100%);transition:.25s}

    .menu-btn{display:inline-flex;align-items:center;gap:8px;position:fixed;top:14px;left:14px;z-index:60;

    .main{padding-top:64px}
    .expert,.gc,.circles{grid-template-columns:1fr}
    .home-cards{grid-template-columns:1fr}

</style>

const nav=document.getElementById('nav'), panel=document.getElementById('panel');
let groups={}; P.forEach(p=>{(groups[p.cat]=groups[p.cat]||[]).push(p)});
Object.keys(groups).forEach(cat=>{
  const g=document.createElement('div'); g.className='navgroup';
  g.innerHTML=`<div class="gt">${cat.replace('Sobre','')}</div>`;
  const box=document.createElement('div');
  groups[cat].forEach(p=>{
    const a=document.createElement('a'); a.dataset.id=p.id;
    const label=p.home?"🏠 Início":(p.name);
    a.innerHTML=`<span>${label}</span>${p.price?`<span class="pr">${p.price}</span>`:""}`;
    a.onclick=()=>show(p.id); box.appendChild(a);
  });
  g.appendChild(box); nav.appendChild(g);
});

function gcBlock(p){
  if(!p.porque||!p.oque) return "";
  return `<div class="gc">
    <div class="g1"><div class="lbl">Por que vende</div><p>${p.porque}</p></div>
    <div class="g2"><div class="lbl">Como vende</div><p>${p.como}</p></div>
    <div class="g3"><div class="lbl">O que vende</div><p>${p.oque}</p></div>
  </div>
  <div class="trig">${(p.trig||[]).map(t=>`<span class="t">🎯 ${t}</span>`).join('')}</div>`;
}

  <div class="block"><p>Nem toda venda fecha no primeiro toque, e tudo bem. A estrutura mais forte pra ticket médio e alto é em dois tempos:</p>
    <div class="step-row" style="margin-top:12px"><div class="num">1º</div><div class="body"><b>Contato 1 — Venda branda</b><p>O objetivo NÃO é fechar, é diagnosticar e gerar confiança. Você escuta, entende a dor, entrega um insight de valor de graça (reciprocidade) e planta a semente. Sai com um compromisso pequeno: "posso te mandar um material?" ou "topa a gente conversar de novo [dia]?".</p></div></div>
    <div class="step-row"><div class="num">2º</div><div class="body"><b>Contato 2 — Oferta quente</b><p>Agora sim você monta uma oportunidade sob medida pra dor que ELE confessou, com uma condição real e com prazo. O cliente sente que é feita pra ele e que não vale a pena desperdiçar. É aqui que a escassez ética fecha.</p></div></div>
  </div>

  <h2 class="sub">5. Objeção é sinal de compra (Sentir · Senti · Descobri)</h2>
  <div class="block"><p>Quando o cliente objeta, ele está interessado (indiferente não discute, vai embora). Nunca discuta. Use o método <b style="color:var(--green-soft)">Sentir, Senti, Descobri</b>: valide o sentimento, mostre que outros sentiram igual, revele o que eles descobriram.</p>
    <div class="say" style="margin-top:10px">"Entendo como você <b>se sente</b>, muita gente que hoje é aluna <b>sentiu</b> exatamente isso antes de começar. O que elas <b>descobriram</b> é que o custo de continuar parada era bem maior que o do primeiro passo."</div>
    <p style="margin-top:14px"><b>Regra do preço:</b> quando vier "tá caro", nunca baixe o preço na hora. Primeiro <b>isole</b> ("é só o valor ou tem mais alguma coisa?"), depois <b>reancore</b> no valor e no custo por dia, e só então, se precisar, <b>desça a escada</b> pro degrau anterior (ex.: da Mentoria pro Acompanhamento, do VIP anual pro mensal). Você reposiciona, nunca perde o cliente.</p>
  </div>

  <h2 class="sub">6. Gatilhos mentais (Cialdini) com ética</h2>
  <div class="block">
    <ul style="gap:11px">
      <li><b>Reciprocidade:</b> entregue valor antes de pedir a venda (um insight, um diagnóstico). Quem recebe, quer retribuir.</li>
      <li><b>Compromisso e coerência:</b> conquiste pequenos "sins" ao longo da conversa. Quem concorda em partes, fecha no todo.</li>
      <li><b>Prova social:</b> "a maioria começa pelo Kit Iniciante", "a turma do VIP cresce todo dia". Gente confia em gente.</li>
      <li><b>Autoridade:</b> a Raquel opera de verdade, o Milton tem 40 anos de mercado. Autoridade tira o medo.</li>
      <li><b>Afinidade:</b> pareça gente, chame pelo nome, ache o ponto em comum. A gente compra de quem gosta.</li>
      <li><b>Escassez:</b> a mais poderosa e a mais perigosa. Só funciona (e só é permitida) quando é REAL.</li>
    </ul>
  </div>

  <h2 class="sub">7. Escassez que fecha sem queimar a marca</h2>
  <div class="block"><p>Escassez real é o que faz o cliente decidir agora em vez de "depois" (que quase sempre é "nunca"). O fechamento clássico funciona: <span class="say" style="display:inline;border:none;padding:0;color:var(--gold-soft)">"estamos com essa condição hoje, o que eu posso fazer pra a gente dar o próximo passo e já colocar no carrinho?"</span>. Mas ele SÓ pode ser usado em cima de uma escassez verdadeira:</p>
    <ul style="margin-top:12px">
      <li><b>Aulão em Turma:</b> são de fato só 10 vagas. Use.</li>
      <li><b>Imersão SP:</b> o espaço físico limita mesmo. Use.</li>
      <li><b>Condição/desconto com data real de fim de lote:</b> se existe prazo, avise. Se não existe, não invente.</li>
    </ul>
    <div class="redline" style="margin-top:14px"><b>Linha vermelha (nunca cruze):</b> não invente "só hoje" que não é só hoje, não finja vaga que não acabou, não crie prazo falso. Urgência mentirosa é infração do Código de Defesa do Consumidor (art. 39), mancha uma marca de educação financeira e destrói o LTV (o cliente pressionado é o que mais pede reembolso e mais vira detrator). A 9Pilla vende método e verdade, a sua venda tem que ser coerente com isso. Quanto maior o ticket, mais a decisão precisa ser consciente.</div>
  </div>

  <h2 class="sub">8. Estudo de caso: a proposta que converte de verdade</h2>
  <div class="block"><p>Um exemplo real de proposta consultiva de alto ticket, bem montada e ética. Repare que cada elemento é honesto, e é isso que o consultor 9Pilla replica:</p>
    <table class="tear">
      <tr><th>Técnica</th><th>Por que funciona</th><th>Como o consultor 9Pilla usa</th></tr>
      <tr><td>Proposta nominal</td><td>Personalização: o cliente é único, não é oferta de massa</td><td>Proposta com o nome do cliente, nunca genérica</td></tr>
      <tr><td>Prazo de validade real</td><td>Escassez verdadeira faz decidir agora</td><td>Prazo de turma/lote real, nunca inventado</td></tr>
      <tr><td>Ancoragem de preço</td><td>O desconto só tem força se existe o valor cheio ao lado</td><td>Mostrar sempre o valor cheio antes do valor final</td></tr>
      <tr><td>Duas opções (A/B)</td><td>Escolha entre duas, não "sim ou não"</td><td>Oferecer 2 caminhos (à vista x parcelado, ou dois degraus)</td></tr>
      <tr><td>Vantagem à vista (Pix)</td><td>Recompensa a decisão rápida sem mentir</td><td>Benefício real pra quem fecha na hora</td></tr>
      <tr><td>Um único CTA</td><td>Uma ação clara, sem dispersão</td><td>Um só próximo passo por conversa</td></tr>
      <tr><td>Vendedor com nome e rosto</td><td>Afinidade + autoridade humana</td><td>O consultor assina, vira gente, não robô</td></tr>
    </table>
    <p style="margin-top:10px;color:var(--muted)">Nada disso é pressão suja: é urgência <b style="color:var(--green-soft)">estruturada</b> em cima da verdade. Copie a estrutura, nunca a mentira.</p>
  </div>

  <h2 class="sub">9. Caso 2: página de imersão (low ticket) e o que dá pra roubar</h2>
  <div class="block">
    <p>Uma página de venda de imersão de R$97 (ticket baixo, compra por impulso) usa a régua mais agressiva do mercado. Nem tudo cabe na 9Pilla, mas quatro técnicas são ouro e éticas:</p>
    <table class="tear">
      <tr><th>Técnica</th><th>Como funciona lá</th><th>Como o consultor 9Pilla usa (calibrado)</th></tr>
      <tr><td>"Para quem é" (auto-identificação)</td><td>Lista avatares de dor pro cliente pensar "esse sou eu"</td><td>"Isso é pra você se: tem medo de perder dinheiro, acha que investir é só pra rico, ou já tentou e desistiu."</td></tr>
      <tr><td>Ancoragem de tempo</td><td>"Meses pra implementar, aqui em 3 dias"</td><td>"Anos tentando sozinho no erro, ou meses com método e alguém do seu lado."</td></tr>
      <tr><td>FAQ = objeção pré-quebrada</td><td>As perguntas frequentes respondem os medos antes de virarem "não"</td><td>Use as objeções deste playbook do mesmo jeito: antecipe, não espere o cliente levantar.</td></tr>
      <tr><td>Risco zero (garantia)</td><td>"7 dias de reembolso, sem perguntas" tira o medo de errar na compra</td><td>Se o produto tiver garantia, diga com todas as letras. Reduz o atrito do primeiro passo.</td></tr>
    </table>
    <div class="redline" style="margin-top:14px"><b>O que NÃO copiar dessa régua:</b> "73% vendidos" e "pode acabar a qualquer momento" funcionam num evento de R$97 por impulso, mas a 9Pilla vende pra quem tem medo de perder dinheiro e opera sob a CVM. Num ebook de R$29 cabe urgência leve; numa mentoria de R$3.799 ou imersão de R$5.000, a decisão precisa ser consciente. E depoimento aqui é sempre de <b>aprendizado e comportamento</b> ("começou a operar com método", "perdeu o medo"), NUNCA de ganho financeiro ("lucrou R$X"). Isso é regra da CVM, não sugestão.</div>
  </div>

  <h2 class="sub">📚 A biblioteca do consultor</h2>
  <div class="lib">
    <div class="bk"><b>A Bíblia de Vendas</b> — Jeffrey Gitomer · <span>as pessoas amam comprar e odeiam que vendam pra elas. Postura, atitude e humor na venda.</span></div>
    <div class="bk"><b>Building a StoryBrand</b> — Donald Miller · <span>o cliente é o herói, a marca é o guia. Como clarear a mensagem pra vender.</span></div>
    <div class="bk"><b>As Armas da Persuasão</b> — Robert Cialdini · <span>os 6 gatilhos: reciprocidade, compromisso, prova social, autoridade, afinidade, escassez.</span></div>
    <div class="bk"><b>Alcançando Excelência em Vendas (SPIN Selling)</b> — Neil Rackham · <span>as perguntas que conduzem o cliente à própria conclusão, ideal pra ticket alto.</span></div>
    <div class="bk"><b>Como Fazer Amigos e Influenciar Pessoas</b> — Dale Carnegie · <span>rapport, escuta e o interesse genuíno pelo outro como base de tudo.</span></div>
  </div>
  <p class="disc">⚠️ Uso interno do consultor. Todas as técnicas pressupõem verdade e conformidade legal (CDC e CVM Res. 20/2021). A 9Pilla não promete rentabilidade e não faz recomendação de investimento. Nunca invente escassez.</p>`;
}

function show(id){
  const p=P.find(x=>x.id===id); if(!p)return;
  panel.innerHTML=render(p);
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.id===id));
  document.querySelector('.side').classList.remove('open');
  window.scrollTo(0,0);
}
show('home');
</script>
